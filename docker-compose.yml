version: '3.8'

services:
  rift-api:
    image: riftbound-api:latest
    build:
      context: .
      dockerfile: src/WepAPI/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=riftbound_db;Username=postgres;Password=rift_pass_123
      - Redis__ConnectionString=cache:6379
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: rift_db
    environment:
      POSTGRES_DB: riftbound_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rift_pass_123
    ports:
      - "5432:5432"
    volumes:
      - rift_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:alpine
    container_name: rift_cache
    ports:
      - "6337:6379"

volumes:
  rift_db_data: